<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus File</title>
<link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAArklEQVR42mNgGAUDDBgJKdDPcvlPiQUXp+1hJMsBlFpMrEOY6GE5PjOZ6GE5PrOZBjoRMtHL97jsGPAQYCFX47mJmzDEjPL9KIsCSizHJ05VBxCyhFRHMFHTcnIcwURty0lVP7jKgVEHDGoHkFrIEKueiRaGkuJYkqOAkOGkhhRZaQCXJeTUBWRXRuRYRjAECDUgadE2HHzZkJahgM1sJnLa8tRslg94x2QUDDgAAOQMQCUsrPaIAAAAAElFTkSuQmCC">
<script>
/* Crash guard. If anything below breaks, say so instead of looking alive but dead. */
window.__fail = function (m) {
  var e = document.getElementById("bootError");
  if (!e) { e = document.createElement("div"); e.id = "bootError";
    e.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99;background:#b5642f;color:#fff;font:600 13px/1.45 -apple-system,system-ui,sans-serif;padding:12px 16px;text-align:center";
    (document.body || document.documentElement).appendChild(e); }
  e.textContent = "This focus file didn't load correctly — " + m + ". Nothing is lost: re-run the setup prompt to make a new one.";
};
addEventListener("error", function (e) { window.__fail(e.message || "script error"); });
addEventListener("DOMContentLoaded", function () { if (!window.__ok) window.__fail("the main script never finished"); });
</script>
<style>
:root{--paper:#fdfbf6;--warm:#f3ede1;--line:#e4d9c5;--hair:#f0e8da;--ink:#26241e;--body:#2c2a24;--soft:#5c5647;
--mut:#8a8474;--faint:#a39c8c;--ghost:#b3ab98;--pine:#2f6a44;--tint:#eef4ea;--chip:#dbe9df;--chipink:#1f4a30;
--clay:#b5642f;--amber:#c08a3e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#ece5d6;font-family:Georgia,"Iowan Old Style",Palatino,serif;color:var(--body);line-height:1.5;
display:flex;justify-content:center;padding:40px 18px 80px;-webkit-font-smoothing:antialiased}
.card{background:var(--paper);border:1px solid var(--line);border-radius:16px;overflow:hidden;max-width:540px;width:100%;position:relative}
.flash{position:absolute;inset:0;background:#e0a86b;opacity:0;pointer-events:none;border-radius:16px}
.flash.on{animation:fl .9s ease-out}
@keyframes fl{0%{opacity:0}12%{opacity:.28}30%{opacity:.05}45%{opacity:.28}100%{opacity:0}}
button,input,textarea,.sans{font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif}
.eyebrow{font-family:-apple-system,system-ui,sans-serif;font-size:10px;font-weight:600;letter-spacing:.16em;
text-transform:uppercase;color:var(--mut)}
.mast{padding:15px 28px 13px;border-bottom:1px solid var(--hair);font-size:15px;font-weight:600;color:var(--pine)}
.head{background:var(--warm);padding:26px 28px 22px;border-bottom:1px solid var(--line)}
.head-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px}
.elapsed{display:none;font-family:-apple-system,system-ui,sans-serif;text-align:right}
.elapsed.on{display:block}
.elapsed b{font-size:20px;color:var(--pine)}
.elapsed span{font-size:12px;font-weight:600;color:var(--mut)}
.right{text-align:right;margin-left:auto}
.scope{font-family:-apple-system,system-ui,sans-serif;font-size:10px;font-weight:600;letter-spacing:.14em;
text-transform:uppercase;color:#756f60;white-space:nowrap}
.clock{font-family:-apple-system,system-ui,sans-serif;font-size:11px;color:#8a8377;margin-top:4px;
white-space:nowrap;font-variant-numeric:tabular-nums}
.clock i{color:#c4bdae;font-style:normal;margin:0 5px}
h1{font-size:33px;line-height:1.04;color:var(--ink);letter-spacing:-.015em;font-weight:400}
.bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-top:16px;display:none}
.bar.on{display:block}
.bar div{width:0;height:100%;background:var(--pine);transition:width .6s ease}
.strip{display:none;padding:14px 28px;border-bottom:1px solid var(--hair);background:var(--tint);
font-family:-apple-system,system-ui,sans-serif;align-items:baseline;gap:10px;flex-wrap:wrap}
.strip.on{display:flex}
.strip .lbl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#3d7a52;white-space:nowrap}
.strip .plan{font-size:13px;color:var(--soft)}
.chip{background:var(--chip);color:var(--chipink);font-size:12px;font-weight:600;padding:4px 11px;border-radius:20px;margin-right:6px}
.rest{color:var(--faint);font-size:12px;font-style:italic}
.why{padding:22px 28px;border-bottom:1px solid var(--hair)}
.why .eyebrow{color:var(--clay);margin-bottom:8px}
.why p{font-size:17px;font-style:italic;color:var(--soft)}
.jobs{display:none;padding:24px 28px;border-bottom:1px solid var(--hair)}
.jobs.on{display:block}
.jobs-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
.counter{font-family:-apple-system,system-ui,sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--pine)}
.job{display:flex;gap:13px;align-items:flex-start;cursor:pointer;user-select:none;margin-bottom:15px;position:relative}
.job input{position:absolute;opacity:0;width:22px;height:22px;margin:0;cursor:pointer}
.job .box{width:22px;height:22px;border:1.5px solid var(--mut);border-radius:5px;background:var(--warm);
flex-shrink:0;margin-top:1px;position:relative}
.job input:focus-visible+.box{outline:2px solid var(--pine);outline-offset:2px}
.job.done .box{background:var(--pine);border-color:var(--pine)}
.job.done .box::after{content:"";position:absolute;left:6px;top:3px;width:6px;height:11px;
border:solid var(--paper);border-width:0 2px 2px 0;transform:rotate(42deg)}
.job .txt{font-family:-apple-system,system-ui,sans-serif;font-size:15.5px;color:var(--body);line-height:1.4}
.job.done .txt{color:var(--faint);text-decoration:line-through;text-decoration-color:var(--line)}
.act{padding:26px 28px;text-align:center;background:var(--warm)}
.begin{display:inline-flex;align-items:center;gap:12px;background:var(--pine);color:var(--paper);font-weight:600;
font-size:16px;padding:16px 16px 16px 30px;border:none;border-radius:40px;cursor:pointer}
.begin:hover{background:#276039}
.begin i{width:36px;height:36px;border-radius:50%;background:var(--paper);color:var(--pine);display:flex;
align-items:center;justify-content:center;font-style:normal}
.check{display:none}
.check.on{display:block}
.ch-head{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:16px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ghost)}
.ch-label{font-family:-apple-system,system-ui,sans-serif;font-size:13px;font-weight:600;color:var(--mut)}
.check.ask .dot{background:var(--clay);animation:p 1.6s ease-in-out infinite}
.check.ask .ch-label{color:var(--clay)}
@keyframes p{0%,100%{opacity:.4}50%{opacity:1}}
@media (prefers-reduced-motion:reduce){.check.ask .dot{animation:none}.flash.on{animation:none}}
.quote{display:none;font-size:15px;font-style:italic;color:var(--soft);border-left:2px solid var(--line);
padding-left:14px;margin:0 auto 18px;max-width:40ch;text-align:left}
.check.ask .quote{display:block}
.answers{display:flex;gap:10px;max-width:400px;margin:0 auto}
.answers button{flex:1;padding:13px 8px;border-radius:8px;background:transparent;font-size:12px;font-weight:600;
letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
.yes{border:1.5px solid var(--pine);color:var(--pine)}
.yes:hover{background:var(--pine);color:var(--paper)}
.sort{border:1.5px solid var(--ghost);color:var(--mut)}
.sort:hover{background:var(--mut);color:var(--paper)}
.no{border:1.5px solid var(--clay);color:var(--clay)}
.no:hover{background:var(--clay);color:var(--paper)}
.pull{display:none;margin-top:22px;padding-top:20px;border-top:1px solid var(--hair)}
.pull.on{display:block}
.pull .eyebrow{color:var(--amber);margin-bottom:10px}
.pull p{font-size:16px;font-style:italic;color:var(--soft);max-width:42ch;margin:0 auto}
.next{font-family:-apple-system,system-ui,sans-serif;font-size:11px;color:#756f60;margin-top:12px;min-height:1em}
.end{background:none;border:none;color:#8f4a24;font-size:12px;text-decoration:underline;cursor:pointer;padding:8px;display:none}
.done-panel,.saved{display:none;padding:30px 28px;text-align:center;background:var(--warm)}
.exit{display:none;padding:30px 28px}
.done-panel.on,.saved.on,.exit.on{display:block}
.done-panel .eyebrow{color:var(--amber);margin-bottom:14px}
.done-panel p{font-size:22px;line-height:1.25;color:var(--ink);max-width:26ch;margin:0 auto 20px}
.btn{background:var(--pine);color:var(--paper);font-weight:600;font-size:15px;padding:14px 26px;border:none;
border-radius:40px;cursor:pointer}
.btn:hover{background:#276039}
.exit h2{font-size:22px;font-weight:400;color:var(--ink);margin-bottom:24px}
.exit label{display:block;font-family:-apple-system,system-ui,sans-serif;font-size:13px;font-weight:600;
color:var(--soft);margin-bottom:9px}
.exit textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:13px 15px;background:var(--paper);
font-size:14px;color:var(--body);resize:none;margin-bottom:18px}
.exit textarea.bad{border-color:var(--clay);background:#fbf1ea}
.foot{margin-top:8px;padding-top:18px;border-top:1px solid var(--hair);display:flex;justify-content:space-between;
align-items:center;gap:12px}
.note{font-family:-apple-system,system-ui,sans-serif;font-size:12px;color:var(--mut)}
.note.warn{color:var(--clay);font-weight:600}
.saved .mark{font-size:40px;color:var(--pine)}
.saved h2{font-size:22px;font-weight:400;color:var(--ink);margin:16px 0 8px}
.saved p{font-family:-apple-system,system-ui,sans-serif;font-size:13px;color:var(--mut);font-style:italic}
.copy{margin-top:26px;background:transparent;color:var(--soft);font-size:12px;font-weight:600;padding:9px 16px;
border:1.5px solid var(--line);border-radius:30px;cursor:pointer}
</style>
</head>
<body>
<div class="card">
<div class="flash" id="flash"></div>
<div class="mast">Focus File</div>

<div class="head">
  <div class="head-top">
    <div class="elapsed" id="elapsed"><b id="mins">0</b><span> min in</span></div>
    <div class="right"><div class="scope" id="scope"></div><div class="clock" id="clock"></div></div>
  </div>
  <h1 id="task"></h1>
  <div class="bar" id="bar"><div id="fill"></div></div>
</div>

<div class="strip" id="sealed"><span class="lbl">Internet off</span><span class="plan" id="sealedPlan"></span></div>
<div class="strip" id="lane"><span class="lbl">Open:</span><span id="chips"></span><span class="rest">— nothing else</span></div>

<div class="why" id="why">
  <div class="eyebrow" id="whyLabel">Watch for</div>
  <p id="whyText"></p>
</div>

<div class="jobs" id="jobs">
  <div class="jobs-head"><span class="eyebrow" id="jobsLabel">The jobs</span><span class="counter" id="counter"></span></div>
  <div id="jobList"></div>
</div>

<div class="act" id="act">
  <button class="begin" id="beginBtn">Begin session <i>→</i></button>
  <div class="check" id="check">
    <div class="ch-head"><span class="dot"></span><span class="ch-label" id="chLabel">On task?</span></div>
    <p class="quote" id="quote"></p>
    <div class="answers">
      <button class="yes" data-a="yes">Yes</button>
      <button class="sort" data-a="sort of">Sort of</button>
      <button class="no" data-a="no">No</button>
    </div>
    <div class="pull" id="pull"><div class="eyebrow">Remember what you're after</div><p id="pullText"></p></div>
  </div>
  <div class="next" id="next"></div>
  <button class="end" id="endBtn">End session</button>
</div>

<div class="done-panel" id="donePanel">
  <div class="eyebrow" id="doneEyebrow">Your block's up</div>
  <p id="doneLine"></p>
  <button class="btn" id="finishBtn">Finish here</button>
</div>

<div class="exit" id="exit">
  <h2>A few quick things — this becomes your log.</h2>
  <label for="q1">Did you finish the block as planned?</label>
  <textarea id="q1" rows="2"></textarea>
  <label for="q2">What, if anything, got in the way of focus?</label>
  <textarea id="q2" rows="2"></textarea>
  <label for="q3">Where will the next block start?</label>
  <textarea id="q3" rows="2"></textarea>
  <div class="foot"><span class="note" id="note"></span><button class="btn" id="saveBtn">Save entry</button></div>
</div>

<div class="saved" id="saved">
  <div class="mark">✓</div>
  <h2>Entry saved.</h2>
  <p>Block by block, ritual becomes habit.</p>
  <button class="copy" id="copyBtn">Copy my log</button>
</div>
</div>

<script id="focus-config" type="application/json">
{
  "task": "1,500 new words on the story",
  "scope": "9:00 – 12:00",
  "blockMinutes": 180,
  "mode": "sealed",
  "sealedPlan": "phone in the other room",
  "laneSites": [],
  "whyLabel": "Watch for",
  "why": "Re-reading and tweaking notes will feel like work. It's the detour. New words only — forward.",
  "finishFeel": "1,500 words that didn't exist this morning. Tomorrow you shape them instead of dreading the blank page.",
  "jobsShape": "none",
  "jobs": [],
  "doneWhenShort": "1,500 new words"
}
</script>

<script>
var $ = function (id) { return document.getElementById(id); };
var cfg, started = null, tick = null, knock = null, endTimer = null, nextAt = null;
var counts = { yes: 0, "sort of": 0, no: 0 };

function hhmm(d) { return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }); }
function plannedStart() { return (cfg.scope || "").split(/[–-]/)[0].trim(); }

function drawClock() {
  var p = [];
  if (plannedStart()) p.push("Planned " + plannedStart());
  p.push(started ? "Started " + hhmm(new Date(started)) : "not started");
  p.push("now " + hhmm(new Date()));
  $("clock").innerHTML = p.join("<i>·</i>");
}

function beep() {
  try {
    var AC = window.AudioContext || window.webkitAudioContext; if (!AC) return;
    var c = new AC(), t0 = c.currentTime;
    [660, 880].forEach(function (f, i) {
      var o = c.createOscillator(), g = c.createGain(), t = t0 + i * 0.16;
      o.type = "sine"; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.18, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);
      o.connect(g).connect(c.destination); o.start(t); o.stop(t + 0.34);
    });
    setTimeout(function () { c.close(); }, 900);
  } catch (e) {}
}

function ask() {
  $("chLabel").textContent = "Are you on task?";
  $("check").classList.add("ask");
  beep();
  var f = $("flash"); f.classList.remove("on"); void f.offsetWidth; f.classList.add("on");
}

function schedule() {
  clearTimeout(knock);
  var d = (28 + Math.random() * 5) * 60000;
  nextAt = Date.now() + d;
  knock = setTimeout(ask, d);
}

function everySecond() {
  var m = (Date.now() - started) / 60000;
  $("mins").textContent = Math.floor(m);
  $("fill").style.width = Math.max(3, Math.min(100, m / cfg.blockMinutes * 100)) + "%";
  var r = Math.max(0, Math.round((nextAt - Date.now()) / 60000));
  $("next").textContent = $("check").classList.contains("ask") ? ""
    : (r <= 1 ? "Check-in any moment" : "Next check-in ~" + r + " min");
}

function countJobs() {
  var all = document.querySelectorAll(".job"), done = document.querySelectorAll(".job.done");
  function pad(n) { return (n < 10 ? "0" : "") + n; }
  $("counter").textContent = pad(done.length) + " / " + pad(all.length) + " COMPLETE";
}

function blockUp() {
  clearTimeout(knock);
  $("check").classList.remove("ask");
  $("act").style.display = "none";
  $("doneLine").textContent = "You said done was " + (cfg.doneWhenShort || cfg.task) + ".";
  $("donePanel").classList.add("on");
}

function showExit() {
  clearInterval(tick); clearTimeout(knock); clearTimeout(endTimer);
  $("act").style.display = "none";
  $("donePanel").classList.remove("on");
  var n = counts.yes + counts["sort of"] + counts.no;
  $("note").textContent = n + (n === 1 ? " check-in" : " check-ins") + " recorded";
  $("exit").classList.add("on");
}

function save() {
  var missing = null;
  [$("q1"), $("q3")].forEach(function (el) {
    if (!el.value.trim()) { el.classList.add("bad"); missing = missing || el; } else el.classList.remove("bad");
  });
  if (missing) {
    $("note").textContent = "Fill the highlighted fields to save.";
    $("note").classList.add("warn"); missing.focus(); return;
  }
  var log = [];
  try { log = JSON.parse(localStorage.getItem("nextblock_entries") || "[]"); } catch (e) {}
  log.push({
    date: new Date().toISOString(), task: cfg.task, mode: cfg.mode,
    plannedStart: plannedStart(),
    actualStart: started ? hhmm(new Date(started)) : "",
    actualFinish: hhmm(new Date()),
    minutes: started ? Math.round((Date.now() - started) / 60000) : 0,
    jobsDone: document.querySelectorAll(".job.done").length,
    jobsTotal: document.querySelectorAll(".job").length,
    checkins: counts,
    asPlanned: $("q1").value.trim(), inTheWay: $("q2").value.trim(), nextStart: $("q3").value.trim()
  });
  localStorage.setItem("nextblock_entries", JSON.stringify(log));
  $("exit").classList.remove("on");
  $("saved").classList.add("on");
}

function logText() {
  var log = [];
  try { log = JSON.parse(localStorage.getItem("nextblock_entries") || "[]"); } catch (e) {}
  return log.map(function (e) {
    var d = new Date(e.date);
    return d.toLocaleDateString([], { month: "short", day: "numeric" }) + " — " + e.task +
      "\nPlanned " + e.plannedStart + ", started " + e.actualStart + ", " + e.minutes + " min" +
      (e.jobsTotal ? "\nJobs: " + e.jobsDone + "/" + e.jobsTotal + " done" : "") +
      "\nCheck-ins: " + e.checkins.yes + " on task, " + e.checkins["sort of"] + " sort of, " + e.checkins.no + " off" +
      "\nAs planned: " + e.asPlanned +
      (e.inTheWay ? "\nGot in the way: " + e.inTheWay : "") +
      "\nNext block starts: " + e.nextStart;
  }).join("\n\n———\n\n");
}

function init() {
  try { cfg = JSON.parse($("focus-config").textContent); }
  catch (e) { window.__fail("the settings block has a typo (" + e.message + ")"); throw e; }

  $("task").textContent = cfg.task;
  $("scope").textContent = cfg.scope || "";
  $("pullText").textContent = cfg.finishFeel || "";
  drawClock();
  setInterval(drawClock, 20000);

  if (cfg.why && cfg.why.trim()) {
    $("whyLabel").textContent = cfg.whyLabel || "Watch for";
    $("whyText").textContent = cfg.why;
    $("quote").textContent = "“" + cfg.why + "”";
  } else {
    $("why").style.display = "none";
    $("quote").style.display = "none";
  }

  if (cfg.mode === "sealed" && cfg.sealedPlan) {
    $("sealedPlan").textContent = cfg.sealedPlan;
    $("sealed").classList.add("on");
  }
  if (cfg.mode === "lane" && (cfg.laneSites || []).length) {
    cfg.laneSites.forEach(function (s) {
      var c = document.createElement("span"); c.className = "chip"; c.textContent = s;
      $("chips").appendChild(c);
    });
    $("lane").classList.add("on");
  }

  if (cfg.jobsShape !== "none" && (cfg.jobs || []).length) {
    $("jobsLabel").textContent = cfg.jobsShape === "milestones" ? "Milestones" : "The jobs";
    cfg.jobs.forEach(function (label, i) {
      var row = document.createElement("label"); row.className = "job"; row.setAttribute("for", "job-" + i);
      var cb = document.createElement("input"); cb.type = "checkbox"; cb.id = "job-" + i;
      var box = document.createElement("span"); box.className = "box";
      var txt = document.createElement("span"); txt.className = "txt"; txt.textContent = label;
      row.appendChild(cb); row.appendChild(box); row.appendChild(txt);
      cb.addEventListener("change", function () { row.classList.toggle("done", cb.checked); countJobs(); });
      $("jobList").appendChild(row);
    });
    $("jobs").classList.add("on");
    countJobs();
  }

  $("beginBtn").onclick = function () {
    started = Date.now();
    this.style.display = "none";
    $("check").classList.add("on");
    $("elapsed").classList.add("on");
    $("bar").classList.add("on");
    $("endBtn").style.display = "inline-block";
    drawClock(); everySecond();
    tick = setInterval(everySecond, 1000);
    schedule();
    endTimer = setTimeout(blockUp, cfg.blockMinutes * 60000);
  };

  Array.prototype.forEach.call(document.querySelectorAll(".answers button"), function (b) {
    b.onclick = function () {
      counts[b.dataset.a]++;
      $("check").classList.remove("ask");
      $("chLabel").textContent = "On task?";
      $("pull").classList.toggle("on", b.dataset.a !== "yes");
      schedule();
    };
  });

  $("endBtn").onclick = showExit;
  $("finishBtn").onclick = showExit;
  $("saveBtn").onclick = save;
  ["q1", "q2", "q3"].forEach(function (id) {
    $(id).oninput = function () { $(id).classList.remove("bad"); $("note").classList.remove("warn"); };
  });
  $("copyBtn").onclick = function () {
    var t = logText(), b = this;
    function ok() { b.textContent = "Copied ✓"; setTimeout(function () { b.textContent = "Copy my log"; }, 1600); }
    function fallback() {
      var ta = document.createElement("textarea");
      ta.value = t; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      try { document.execCommand("copy"); ok(); }
      catch (e) { b.textContent = "Press Ctrl/Cmd-C"; ta.style.opacity = "1"; return; }
      document.body.removeChild(ta);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(t).then(ok, fallback);
    } else { fallback(); }
  };

  window.__ok = true;
}
init();
</script>
